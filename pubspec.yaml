name: dart_tui
description: >-
  Elm-style terminal UI framework for Dart. Port of Charmbracelet Bubble Tea:
  Model–Update–View architecture, async commands, composable components, and
  a full Bubbles component library.
version: 1.0.0
homepage: https://github.com/codenameakshay/dart_tui
repository: https://github.com/codenameakshay/dart_tui
issue_tracker: https://github.com/codenameakshay/dart_tui/issues
documentation: https://pub.dev/documentation/dart_tui/latest/

environment:
  sdk: ">=3.5.0 <4.0.0"

topics:
  - terminal
  - tui
  - cli
  - elm
  - bubbletea

dependencies:
  dart_console: ^4.1.0
  meta: ^1.12.0
  characters: ^1.3.0
  path: ^1.9.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
