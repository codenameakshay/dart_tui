name: dart_tui
description: >
  Elm-style terminal UI for Dart, inspired by Bubble Tea (Model, Update, View, Cmd).
  Build interactive CLIs with messages, async commands, and composable components.
version: 0.1.0
repository: https://github.com/codenameakshay/dart_cli_toolkit

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  dart_console: ^4.1.0
  meta: ^1.12.0
  characters: ^1.3.0
  path: ^1.9.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
